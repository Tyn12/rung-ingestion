name: Ingest Stack Overflow Survey

# Survey releases annually in May/June. We poll once a week between May and
# August; after that the run is a no-op until the next release lands.

on:
  schedule:
    - cron: "0 6 * * 1"     # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      year:
        description: "Survey year (blank = current year)"
        required: false
        default: ""
        type: string
      url:
        description: "Override download URL"
        required: false
        default: ""
      dry_run:
        description: "Fetch + parse but skip DB write"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Determine year
        id: year
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            echo "value=${{ github.event.inputs.year }}" >> $GITHUB_OUTPUT
          else
            # Default: current year. If the release isn't out yet the fetch will
            # fail fast and we'll retry next week.
            echo "value=$(date +%Y)" >> $GITHUB_OUTPUT
          fi
      - name: Run ingestion
        run: |
          ARGS="--year ${{ steps.year.outputs.value }}"
          [ -n "${{ github.event.inputs.url }}" ] && ARGS="$ARGS --url ${{ github.event.inputs.url }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python -m ingestion.stack_overflow.run $ARGS || echo "::warning::Survey not yet available"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: so-raw-${{ github.run_id }}
          path: data/raw/stack_overflow/
          retention-days: 90
          if-no-files-found: ignore
