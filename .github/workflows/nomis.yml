name: Ingest Nomis ASHE

# ASHE is published once a year, typically late October / early November.
# We run on the 1st of every month Nov-Jan to catch the release + any revisions,
# and make the workflow manually dispatchable for backfills.

on:
  schedule:
    - cron: "0 3 1 11,12,1 *"     # 03:00 UTC on Nov 1 / Dec 1 / Jan 1
  workflow_dispatch:
    inputs:
      dataset:
        description: "Nomis dataset ID"
        required: false
        default: "NM_99_1"
        type: choice
        options:
          - NM_99_1
          - NM_30_1
      years:
        description: "Space-separated years to backfill (e.g. '2022 2023'). Leave blank for latest."
        required: false
        default: ""
      dry_run:
        description: "Run fetch + parse but skip DB write"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ingest-nomis
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NOMIS_API_KEY: ${{ secrets.NOMIS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Nomis ingestion
        run: |
          ARGS="--dataset ${{ github.event.inputs.dataset || 'NM_99_1' }}"
          if [ -n "${{ github.event.inputs.years }}" ]; then
            ARGS="$ARGS --years ${{ github.event.inputs.years }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: python -m ingestion.nomis.run $ARGS"
          python -m ingestion.nomis.run $ARGS

      - name: Upload raw data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nomis-raw-${{ github.run_id }}
          path: data/raw/nomis/
          retention-days: 90
          if-no-files-found: ignore
