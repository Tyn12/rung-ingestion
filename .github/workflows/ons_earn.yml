name: Ingest ONS Average Weekly Earnings

# EARN01/02/03 update monthly, usually around the 3rd Tuesday with the
# Labour Market Overview release. We poll every Wednesday.

on:
  schedule:
    - cron: "0 8 * * 3"    # Wednesdays 08:00 UTC
  workflow_dispatch:
    inputs:
      datasets:
        description: "Space-separated dataset codes (default: all)"
        required: false
        default: ""
      since_years:
        description: "Retain observations from last N years"
        required: false
        default: "2"
      dry_run:
        description: "Fetch + parse but skip DB write"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run ingestion
        run: |
          ARGS="--since-years ${{ github.event.inputs.since_years || '2' }}"
          [ -n "${{ github.event.inputs.datasets }}" ] && ARGS="$ARGS --datasets ${{ github.event.inputs.datasets }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python -m ingestion.ons_earn.run $ARGS
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ons-earn-raw-${{ github.run_id }}
          path: data/raw/ons_earn/
          retention-days: 180
          if-no-files-found: ignore
