name: Ingest London Datastore Earnings

# GLA revises borough earnings ~once a year (after ASHE lands, typically Nov).
# Monthly polling is cheap and idempotent.

on:
  schedule:
    - cron: "45 7 1 * *"   # 1st of each month 07:45 UTC
  workflow_dispatch:
    inputs:
      datasets:
        description: "Space-separated CKAN slugs (default: all)"
        required: false
        default: ""
      dry_run:
        description: "Fetch + parse but skip DB write"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run ingestion
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.datasets }}" ] && ARGS="$ARGS --datasets ${{ github.event.inputs.datasets }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python -m ingestion.london_datastore.run $ARGS
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: london-datastore-raw-${{ github.run_id }}
          path: data/raw/london_datastore/
          retention-days: 365
          if-no-files-found: ignore
