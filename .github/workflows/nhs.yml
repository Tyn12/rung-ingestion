name: Ingest NHS Agenda for Change

# AfC pay circulars publish around April, sometimes delayed to July/Aug after
# pay negotiations. We poll weekly April-September; rest of year is idempotent.

on:
  schedule:
    - cron: "0 7 * * 2"    # Tuesdays 07:00 UTC
  workflow_dispatch:
    inputs:
      year:
        description: "Pay year starting (April)"
        required: false
        default: ""
      dry_run:
        description: "Fetch + parse but skip DB write"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run ingestion
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.year }}" ] && ARGS="--year ${{ github.event.inputs.year }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          python -m ingestion.nhs.run $ARGS
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nhs-raw-${{ github.run_id }}
          path: data/raw/nhs/
          retention-days: 365
          if-no-files-found: ignore
